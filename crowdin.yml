# Crowdin configuration for the V2 UI (ui/messages, Paraglide JS / inlang).
#
# English is the source of truth (ui/messages/en.json — a flat map of dotted,
# namespace-prefixed message ids). Crowdin creates one sibling file per target
# locale (e.g. de.json, fr.json, pt-BR.json) in the same folder. Register a
# downloaded locale in `locales` in ui/project.inlang/settings.json before it
# ships so Paraglide compiles it.
#
# Auth via env vars (do NOT commit tokens):
#   export CROWDIN_PROJECT_ID=...        # numeric project id
#   export CROWDIN_PERSONAL_TOKEN=...    # personal access token
#
# Usage: `crowdin upload sources` then `crowdin download` (see CLI install at
# https://crowdin.github.io/crowdin-cli/).

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: '.'
preserve_hierarchy: true

files:
  - source: /ui/messages/en.json
    translation: /ui/messages/%locale%.json
    # %locale% → de, fr, pt-BR, zh-CN … must match the codes listed in
    # ui/project.inlang/settings.json (`locales`).
