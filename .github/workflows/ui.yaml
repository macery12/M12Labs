name: UI

on:
  push:
    branches:
      - "develop"
      - "3.x-develop"
  pull_request:
    branches:
      - "develop"
      - "3.x-develop"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

  tests:
    name: Tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache Vite build artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-build-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('resources/scripts/**') }}
          restore-keys: |
            vite-build-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            vite-build-${{ runner.os }}-node${{ matrix.node }}-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
