  # Application API - Servers (expanded)
  /application/servers:
    get:
      tags:
        - Application - Servers
      summary: List all servers
      description: Get all servers in the system
      operationId: listAllServers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
        - name: filter[uuid]
          in: query
          description: Filter by UUID
          schema:
            type: string
        - name: filter[name]
          in: query
          description: Filter by name
          schema:
            type: string
        - name: filter[owner_id]
          in: query
          description: Filter by owner ID
          schema:
            type: integer
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Server'
                  meta:
                    type: object
                    properties:
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Application - Servers
      summary: Create server
      description: Create a new server
      operationId: createServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - user
                - egg
                - docker_image
                - startup
                - environment
                - limits
                - feature_limits
                - allocation
              properties:
                name:
                  type: string
                  description: Server name
                description:
                  type: string
                  description: Server description
                user:
                  type: integer
                  description: User ID who will own the server
                egg:
                  type: integer
                  description: Egg ID
                docker_image:
                  type: string
                  description: Docker image to use
                startup:
                  type: string
                  description: Startup command
                environment:
                  type: object
                  description: Environment variables
                  additionalProperties:
                    type: string
                limits:
                  type: object
                  required:
                    - memory
                    - disk
                    - cpu
                  properties:
                    memory:
                      type: integer
                      description: Memory limit in MB
                    swap:
                      type: integer
                      description: Swap limit in MB
                      default: 0
                    disk:
                      type: integer
                      description: Disk limit in MB
                    io:
                      type: integer
                      description: IO weight
                      default: 500
                    cpu:
                      type: integer
                      description: CPU limit in %
                feature_limits:
                  type: object
                  properties:
                    databases:
                      type: integer
                      description: Database limit
                      default: 0
                    allocations:
                      type: integer
                      description: Allocation limit
                      default: 0
                    backups:
                      type: integer
                      description: Backup limit
                      default: 0
                allocation:
                  type: object
                  required:
                    - default
                  properties:
                    default:
                      type: integer
                      description: Default allocation ID
                    additional:
                      type: array
                      items:
                        type: integer
                      description: Additional allocation IDs
                external_id:
                  type: string
                  nullable: true
                start_on_completion:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Server created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
