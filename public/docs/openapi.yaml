openapi: 3.0.3
info:
  title: Jexpanel API
  description: |
    API documentation for Jexpanel (formerly Jexactyl) - A modern game server management panel and billing system built on Pterodactyl Panel.
    
    ## Authentication
    
    The API uses Bearer token authentication. Include your API key in the Authorization header:
    
    ```
    Authorization: Bearer YOUR_API_KEY
    ```
    
    ## API Types
    
    Jexpanel has three main API types:
    
    - **Application API** (`/api/application/*`) - Administrative API for managing the panel
    - **Client API** (`/api/client/*`) - User-facing API for managing servers and accounts
    - **Remote API** (`/api/remote/*`) - API for daemon communication
    
    ## Rate Limiting
    
    API requests are rate limited. Check the response headers for rate limit information.
    
  version: 4.0.0
  contact:
    name: Jexpanel Support
    url: https://github.com/Jexactyl/Jexactyl
  license:
    name: MIT
    url: https://github.com/Jexactyl/Jexactyl/blob/main/LICENSE.md

servers:
  - url: https://panel.example.com/api
    description: Production server (replace with your domain)
  - url: http://localhost/api
    description: Local development server

tags:
  - name: Application - Overview
    description: Panel overview and metrics
  - name: Application - Settings
    description: Panel settings management
  - name: Application - Authentication
    description: Authentication module management
  - name: Application - Billing
    description: Billing system management
  - name: Application - Users
    description: User management
  - name: Application - Nodes
    description: Node management
  - name: Application - Servers
    description: Server management
  - name: Application - Nests & Eggs
    description: Nest and egg management
  - name: Application - Roles
    description: Role management
  - name: Application - Locations
    description: Location management
  - name: Application - Databases
    description: Database host management
  - name: Application - Webhooks
    description: Webhook configuration
  - name: Application - Tickets
    description: Support ticket management
  - name: Application - Theme
    description: Panel theme customization
  - name: Application - Links
    description: Custom links management
  - name: Application - Alerts
    description: Alert management
  - name: Application - AI
    description: AI/Intelligence features
  - name: Application - API Keys
    description: Application API key management
  - name: Client - Account
    description: User account management
  - name: Client - Servers
    description: Server operations
  - name: Client - Billing
    description: Billing and purchases
  - name: Client - Server Groups
    description: Server group management
  - name: Client - Support
    description: Support tickets
  - name: Client - Server Files
    description: File management operations
  - name: Client - Server Databases
    description: Database management
  - name: Client - Server Schedules
    description: Task scheduling
  - name: Client - Server Backups
    description: Backup management
  - name: Client - Server Users
    description: Subuser management
  - name: Client - Server Network
    description: Network allocation management
  - name: Client - Server Startup
    description: Startup configuration
  - name: Client - Server Settings
    description: Server settings
  - name: Remote
    description: Daemon communication

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key authentication using Bearer token
  
  schemas:
    Error:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              status:
                type: string
              detail:
                type: string
    
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
        total:
          type: integer
    
    Server:
      type: object
      properties:
        object:
          type: string
          example: server
        attributes:
          type: object
          properties:
            id:
              type: integer
            external_id:
              type: string
              nullable: true
            uuid:
              type: string
            identifier:
              type: string
            name:
              type: string
            description:
              type: string
            status:
              type: string
              nullable: true
            suspended:
              type: boolean
            limits:
              type: object
              properties:
                memory:
                  type: integer
                swap:
                  type: integer
                disk:
                  type: integer
                io:
                  type: integer
                cpu:
                  type: integer
                threads:
                  type: string
                  nullable: true
            feature_limits:
              type: object
              properties:
                databases:
                  type: integer
                allocations:
                  type: integer
                backups:
                  type: integer
            user:
              type: integer
            node:
              type: integer
            allocation:
              type: integer
            nest:
              type: integer
            egg:
              type: integer
            container:
              type: object
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    User:
      type: object
      properties:
        object:
          type: string
          example: user
        attributes:
          type: object
          properties:
            id:
              type: integer
            external_id:
              type: string
              nullable: true
            uuid:
              type: string
            username:
              type: string
            email:
              type: string
              format: email
            first_name:
              type: string
            last_name:
              type: string
            language:
              type: string
            root_admin:
              type: boolean
            2fa:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Node:
      type: object
      properties:
        object:
          type: string
          example: node
        attributes:
          type: object
          properties:
            id:
              type: integer
            uuid:
              type: string
            public:
              type: boolean
            name:
              type: string
            description:
              type: string
            location_id:
              type: integer
            fqdn:
              type: string
            scheme:
              type: string
              enum: [http, https]
            behind_proxy:
              type: boolean
            maintenance_mode:
              type: boolean
            memory:
              type: integer
            memory_overallocate:
              type: integer
            disk:
              type: integer
            disk_overallocate:
              type: integer
            upload_size:
              type: integer
            daemon_listen:
              type: integer
            daemon_sftp:
              type: integer
            daemon_base:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    BillingCategory:
      type: object
      properties:
        object:
          type: string
          example: billing_category
        attributes:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            description:
              type: string
            icon:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    BillingProduct:
      type: object
      properties:
        object:
          type: string
          example: billing_product
        attributes:
          type: object
          properties:
            id:
              type: integer
            category_id:
              type: integer
            name:
              type: string
            description:
              type: string
            price:
              type: number
              format: float
            memory:
              type: integer
            disk:
              type: integer
            cpu:
              type: integer
            swap:
              type: integer
            io:
              type: integer
            databases:
              type: integer
            allocations:
              type: integer
            backups:
              type: integer
            nest_id:
              type: integer
            egg_id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Allocation:
      type: object
      properties:
        object:
          type: string
          example: allocation
        attributes:
          type: object
          properties:
            id:
              type: integer
            ip:
              type: string
            ip_alias:
              type: string
              nullable: true
            port:
              type: integer
            notes:
              type: string
              nullable: true
            is_default:
              type: boolean
    
    Database:
      type: object
      properties:
        object:
          type: string
          example: server_database
        attributes:
          type: object
          properties:
            id:
              type: string
            host:
              type: object
              properties:
                address:
                  type: string
                port:
                  type: integer
            name:
              type: string
            username:
              type: string
            connections_from:
              type: string
            max_connections:
              type: integer
    
    Backup:
      type: object
      properties:
        object:
          type: string
          example: backup
        attributes:
          type: object
          properties:
            uuid:
              type: string
            is_successful:
              type: boolean
            is_locked:
              type: boolean
            name:
              type: string
            ignored_files:
              type: string
            checksum:
              type: string
              nullable: true
            bytes:
              type: integer
            created_at:
              type: string
              format: date-time
            completed_at:
              type: string
              format: date-time
              nullable: true
    
    Schedule:
      type: object
      properties:
        object:
          type: string
          example: schedule
        attributes:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            cron:
              type: object
              properties:
                day_of_week:
                  type: string
                day_of_month:
                  type: string
                month:
                  type: string
                hour:
                  type: string
                minute:
                  type: string
            is_active:
              type: boolean
            is_processing:
              type: boolean
            only_when_online:
              type: boolean
            last_run_at:
              type: string
              format: date-time
              nullable: true
            next_run_at:
              type: string
              format: date-time
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Task:
      type: object
      properties:
        object:
          type: string
          example: schedule_task
        attributes:
          type: object
          properties:
            id:
              type: integer
            sequence_id:
              type: integer
            action:
              type: string
            payload:
              type: string
            time_offset:
              type: integer
            is_queued:
              type: boolean
            continue_on_failure:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Subuser:
      type: object
      properties:
        object:
          type: string
          example: subuser
        attributes:
          type: object
          properties:
            uuid:
              type: string
            username:
              type: string
            email:
              type: string
            image:
              type: string
            2fa_enabled:
              type: boolean
            created_at:
              type: string
              format: date-time
            permissions:
              type: array
              items:
                type: string
    
    Egg:
      type: object
      properties:
        object:
          type: string
          example: egg
        attributes:
          type: object
          properties:
            uuid:
              type: string
            name:
              type: string
            description:
              type: string
            docker_image:
              type: string
            docker_images:
              type: object
            startup:
              type: string
    
    Location:
      type: object
      properties:
        object:
          type: string
          example: location
        attributes:
          type: object
          properties:
            id:
              type: integer
            short:
              type: string
            long:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Nest:
      type: object
      properties:
        object:
          type: string
          example: nest
        attributes:
          type: object
          properties:
            id:
              type: integer
            uuid:
              type: string
            author:
              type: string
            name:
              type: string
            description:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    ActivityLog:
      type: object
      properties:
        object:
          type: string
          example: activity_log
        attributes:
          type: object
          properties:
            id:
              type: string
            event:
              type: string
            ip:
              type: string
            description:
              type: string
            properties:
              type: object
            timestamp:
              type: string
              format: date-time

paths:
  # Application API - Overview
  /application/overview/version:
    get:
      tags:
        - Application - Overview
      summary: Get panel version
      description: Returns the current panel version information
      operationId: getVersion
      responses:
        '200':
          description: Panel version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  php_version:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/overview/metrics:
    get:
      tags:
        - Application - Overview
      summary: Get panel metrics
      description: Returns overview metrics for the panel
      operationId: getMetrics
      responses:
        '200':
          description: Panel metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: object
                  users:
                    type: object
                  nodes:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Activity
  /application/activity:
    get:
      tags:
        - Application - Overview
      summary: Get activity logs
      description: Returns activity logs for admin actions
      operationId: getActivityLogs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of activity logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Permissions
  /application/permissions:
    get:
      tags:
        - Application - Overview
      summary: Get admin permissions
      description: Returns all available admin permissions
      operationId: getAdminPermissions
      responses:
        '200':
          description: Admin permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Settings
  /application/settings:
    patch:
      tags:
        - Application - Settings
      summary: Update general settings
      description: Update general panel settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Panel name
                locale:
                  type: string
                  description: Default locale
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/settings/mode:
    patch:
      tags:
        - Application - Settings
      summary: Update panel mode
      description: Update panel operation mode settings
      operationId: updateMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration:
                  type: boolean
                  description: Enable/disable user registration
      responses:
        '200':
          description: Mode updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Billing Categories
  /application/billing/analytics:
    get:
      tags:
        - Application - Billing
      summary: Get billing analytics
      description: Returns billing analytics and revenue data
      operationId: getBillingAnalytics
      responses:
        '200':
          description: Billing analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_revenue:
                    type: number
                  monthly_revenue:
                    type: number
                  total_orders:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/settings:
    put:
      tags:
        - Application - Billing
      summary: Update billing settings
      description: Update billing configuration settings
      operationId: updateBillingSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                currency:
                  type: string
                stripe_enabled:
                  type: boolean
                paypal_enabled:
                  type: boolean
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/keys:
    delete:
      tags:
        - Application - Billing
      summary: Reset payment keys
      description: Reset Stripe and PayPal API keys
      operationId: resetPaymentKeys
      responses:
        '204':
          description: Keys reset successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/categories:
    get:
      tags:
        - Application - Billing
      summary: List billing categories
      description: Get all billing categories
      operationId: listBillingCategories
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of billing categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingCategory'
                  meta:
                    type: object
                    properties:
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Application - Billing
      summary: Create billing category
      description: Create a new billing category
      operationId: createBillingCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/categories/{category}:
    get:
      tags:
        - Application - Billing
      summary: Get billing category
      description: Get a specific billing category
      operationId: getBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    patch:
      tags:
        - Application - Billing
      summary: Update billing category
      description: Update a billing category
      operationId: updateBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      tags:
        - Application - Billing
      summary: Delete billing category
      description: Delete a billing category
      operationId: deleteBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/categories/{category}/products:
    get:
      tags:
        - Application - Billing
      summary: List products in category
      description: Get all products within a billing category
      operationId: listProductsInBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingProduct'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Application - Billing
      summary: Create product
      description: Create a new billing product in a category
      operationId: createBillingProduct
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - memory
                - disk
                - cpu
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                  format: float
                memory:
                  type: integer
                disk:
                  type: integer
                cpu:
                  type: integer
                swap:
                  type: integer
                io:
                  type: integer
                databases:
                  type: integer
                allocations:
                  type: integer
                backups:
                  type: integer
                nest_id:
                  type: integer
                egg_id:
                  type: integer
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProduct'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/categories/{category}/products/{product}:
    get:
      tags:
        - Application - Billing
      summary: Get product details
      description: Get a specific product within a category
      operationId: getBillingProduct
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
        - name: product
          in: path
          required: true
          description: Product ID
