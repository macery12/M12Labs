openapi: 3.0.3
info:
  title: Jexpanel API
  description: |
    API documentation for Jexpanel (formerly Jexactyl) - A modern game server management panel and billing system built on Pterodactyl Panel.
    
    ## Authentication
    
    The API uses Bearer token authentication. Include your API key in the Authorization header:
    
    ```
    Authorization: Bearer YOUR_API_KEY
    ```
    
    ## API Types
    
    Jexpanel has three main API types:
    
    - **Application API** (`/api/application/*`) - Administrative API for managing the panel
    - **Client API** (`/api/client/*`) - User-facing API for managing servers and accounts
    - **Remote API** (`/api/remote/*`) - API for daemon communication
    
    ## Rate Limiting
    
    API requests are rate limited. Check the response headers for rate limit information.
    
  version: 4.0.0
  contact:
    name: Jexpanel Support
    url: https://github.com/Jexactyl/Jexactyl
  license:
    name: MIT
    url: https://github.com/Jexactyl/Jexactyl/blob/main/LICENSE.md

servers:
  - url: https://panel.example.com/api
    description: Production server (replace with your domain)
  - url: http://localhost/api
    description: Local development server

tags:
  - name: Application - Overview
    description: Panel overview and metrics
  - name: Application - Settings
    description: Panel settings management
  - name: Application - Authentication
    description: Authentication module management
  - name: Application - Billing
    description: Billing system management
  - name: Application - Users
    description: User management
  - name: Application - Nodes
    description: Node management
  - name: Application - Servers
    description: Server management
  - name: Application - Nests & Eggs
    description: Nest and egg management
  - name: Client - Account
    description: User account management
  - name: Client - Servers
    description: Server operations
  - name: Client - Billing
    description: Billing and purchases
  - name: Remote
    description: Daemon communication

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key authentication using Bearer token
  
  schemas:
    Error:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              status:
                type: string
              detail:
                type: string
    
    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
        total:
          type: integer
    
    Server:
      type: object
      properties:
        object:
          type: string
          example: server
        attributes:
          type: object
          properties:
            id:
              type: integer
            external_id:
              type: string
              nullable: true
            uuid:
              type: string
            identifier:
              type: string
            name:
              type: string
            description:
              type: string
            status:
              type: string
              nullable: true
            suspended:
              type: boolean
            limits:
              type: object
              properties:
                memory:
                  type: integer
                swap:
                  type: integer
                disk:
                  type: integer
                io:
                  type: integer
                cpu:
                  type: integer
                threads:
                  type: string
                  nullable: true
            feature_limits:
              type: object
              properties:
                databases:
                  type: integer
                allocations:
                  type: integer
                backups:
                  type: integer
            user:
              type: integer
            node:
              type: integer
            allocation:
              type: integer
            nest:
              type: integer
            egg:
              type: integer
            container:
              type: object
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    User:
      type: object
      properties:
        object:
          type: string
          example: user
        attributes:
          type: object
          properties:
            id:
              type: integer
            external_id:
              type: string
              nullable: true
            uuid:
              type: string
            username:
              type: string
            email:
              type: string
              format: email
            first_name:
              type: string
            last_name:
              type: string
            language:
              type: string
            root_admin:
              type: boolean
            2fa:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    Node:
      type: object
      properties:
        object:
          type: string
          example: node
        attributes:
          type: object
          properties:
            id:
              type: integer
            uuid:
              type: string
            public:
              type: boolean
            name:
              type: string
            description:
              type: string
            location_id:
              type: integer
            fqdn:
              type: string
            scheme:
              type: string
              enum: [http, https]
            behind_proxy:
              type: boolean
            maintenance_mode:
              type: boolean
            memory:
              type: integer
            memory_overallocate:
              type: integer
            disk:
              type: integer
            disk_overallocate:
              type: integer
            upload_size:
              type: integer
            daemon_listen:
              type: integer
            daemon_sftp:
              type: integer
            daemon_base:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    BillingCategory:
      type: object
      properties:
        object:
          type: string
          example: billing_category
        attributes:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            description:
              type: string
            icon:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    
    BillingProduct:
      type: object
      properties:
        object:
          type: string
          example: billing_product
        attributes:
          type: object
          properties:
            id:
              type: integer
            category_id:
              type: integer
            name:
              type: string
            description:
              type: string
            price:
              type: number
              format: float
            memory:
              type: integer
            disk:
              type: integer
            cpu:
              type: integer
            swap:
              type: integer
            io:
              type: integer
            databases:
              type: integer
            allocations:
              type: integer
            backups:
              type: integer
            nest_id:
              type: integer
            egg_id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

paths:
  # Application API - Overview
  /application/overview/version:
    get:
      tags:
        - Application - Overview
      summary: Get panel version
      description: Returns the current panel version information
      operationId: getVersion
      responses:
        '200':
          description: Panel version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  php_version:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/overview/metrics:
    get:
      tags:
        - Application - Overview
      summary: Get panel metrics
      description: Returns overview metrics for the panel
      operationId: getMetrics
      responses:
        '200':
          description: Panel metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: object
                  users:
                    type: object
                  nodes:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Settings
  /application/settings:
    patch:
      tags:
        - Application - Settings
      summary: Update general settings
      description: Update general panel settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                locale:
                  type: string
      responses:
        '200':
          description: Settings updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Billing Categories
  /application/billing/categories:
    get:
      tags:
        - Application - Billing
      summary: List billing categories
      description: Get all billing categories
      operationId: listBillingCategories
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of billing categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingCategory'
                  meta:
                    type: object
                    properties:
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Application - Billing
      summary: Create billing category
      description: Create a new billing category
      operationId: createBillingCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /application/billing/categories/{category}:
    get:
      tags:
        - Application - Billing
      summary: Get billing category
      description: Get a specific billing category
      operationId: getBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    patch:
      tags:
        - Application - Billing
      summary: Update billing category
      description: Update a billing category
      operationId: updateBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCategory'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      tags:
        - Application - Billing
      summary: Delete billing category
      description: Delete a billing category
      operationId: deleteBillingCategory
      parameters:
        - name: category
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Client API - Account
  /client:
    get:
      tags:
        - Client - Servers
      summary: List servers
      description: Get all servers accessible to the authenticated user
      operationId: listServers
      parameters:
        - name: type
          in: query
          description: Filter servers by type
          schema:
            type: string
            enum: [admin, admin-all, owner]
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: filter[uuid]
          in: query
          description: Filter by UUID
          schema:
            type: string
        - name: filter[name]
          in: query
          description: Filter by name
          schema:
            type: string
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Server'
                  meta:
                    type: object
                    properties:
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/permissions:
    get:
      tags:
        - Client - Account
      summary: Get permissions
      description: Get all available permissions in the system
      operationId: getPermissions
      responses:
        '200':
          description: System permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: system_permissions
                  attributes:
                    type: object
                    properties:
                      permissions:
                        type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account:
    get:
      tags:
        - Client - Account
      summary: Get account details
      description: Get the authenticated user's account information
      operationId: getAccount
      responses:
        '200':
          description: Account information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account/email:
    put:
      tags:
        - Client - Account
      summary: Update email
      description: Update the authenticated user's email address
      operationId: updateEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Email updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account/password:
    put:
      tags:
        - Client - Account
      summary: Update password
      description: Update the authenticated user's password
      operationId: updatePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - password
                - password_confirmation
              properties:
                current_password:
                  type: string
                  format: password
                password:
                  type: string
                  format: password
                password_confirmation:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account/two-factor:
    get:
      tags:
        - Client - Account
      summary: Get 2FA details
      description: Get two-factor authentication setup details
      operationId: getTwoFactor
      responses:
        '200':
          description: 2FA details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      image_url_data:
                        type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Client - Account
      summary: Enable 2FA
      description: Enable two-factor authentication
      operationId: enableTwoFactor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  attributes:
                    type: object
                    properties:
                      tokens:
                        type: array
                        items:
                          type: string
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account/api-keys:
    get:
      tags:
        - Client - Account
      summary: List API keys
      description: Get all API keys for the authenticated user
      operationId: listApiKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Client - Account
      summary: Create API key
      description: Create a new API key
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - allowed_ips
              properties:
                description:
                  type: string
                allowed_ips:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                  attributes:
                    type: object
                    properties:
                      identifier:
                        type: string
                      description:
                        type: string
                      allowed_ips:
                        type: array
                        items:
                          type: string
                      created_at:
                        type: string
                        format: date-time
                  meta:
                    type: object
                    properties:
                      secret_token:
                        type: string
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/account/api-keys/{identifier}:
    delete:
      tags:
        - Client - Account
      summary: Delete API key
      description: Delete an API key
      operationId: deleteApiKey
      parameters:
        - name: identifier
          in: path
          required: true
          description: API key identifier
          schema:
            type: string
      responses:
        '204':
          description: API key deleted successfully
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Client API - Billing
  /client/billing/categories:
    get:
      tags:
        - Client - Billing
      summary: List billing categories
      description: Get all available billing categories
      operationId: listClientBillingCategories
      responses:
        '200':
          description: List of billing categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingCategory'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/billing/categories/{id}:
    get:
      tags:
        - Client - Billing
      summary: List products in category
      description: Get all products in a billing category
      operationId: listProductsInCategory
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: integer
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingProduct'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/billing/products/{id}:
    get:
      tags:
        - Client - Billing
      summary: Get product details
      description: Get details of a specific product
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: integer
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProduct'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /client/billing/process:
    post:
      tags:
        - Client - Billing
      summary: Process payment
      description: Process a payment for a product purchase
      operationId: processPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - payment_method
              properties:
                product_id:
                  type: integer
                payment_method:
                  type: string
                payment_intent:
                  type: string
      responses:
        '200':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  server_id:
                    type: integer
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Application API - Users
  /application/users:
    get:
      tags:
        - Application - Users
      summary: List users
      description: Get all users in the panel
      operationId: listUsers
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
  
  # Application API - Nodes
  /application/nodes:
    get:
      tags:
        - Application - Nodes
      summary: List nodes
      description: Get all nodes in the panel
      operationId: listNodes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
  
  /application/nodes/{node}:
    get:
      tags:
        - Application - Nodes
      summary: Get node details
      operationId: getNode
      parameters:
        - name: node
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
